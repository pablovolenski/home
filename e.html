<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workspace</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet" />
    <style>
        :root {
            --bg: #fcfcfc;
            --text: #333;
            --border: #ddd;
            --accent: #eee;
            --top-bar: #fff;
            --font-main: 'Segoe UI', system-ui, sans-serif;
            --font-code: 'Courier New', Courier, monospace;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: var(--font-main);
            background: var(--bg); color: var(--text);
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* Top Bar & File Menu */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 15px; background: var(--top-bar);
            border-bottom: 1px solid var(--border); z-index: 100;
        }
        
        .nav-tabs { display: flex; gap: 10px; }
        .nav-btn {
            padding: 8px 16px; border: 1px solid var(--border);
            background: #fff; border-radius: 4px; cursor: pointer;
            font-family: var(--font-main); font-weight: bold; color: #555;
        }
        .nav-btn.active { background: #e0e0e0; color: #000; }

        .file-controls { display: flex; gap: 10px; align-items: center; }
        .icon-btn {
            background: none; border: 1px solid var(--border); padding: 6px 10px;
            cursor: pointer; border-radius: 4px; font-size: 14px;
        }
        .icon-btn:hover { background: var(--accent); }

        /* Collapsible File Section */
        .file-dropdown {
            position: absolute; top: 50px; left: 0; width: 100%;
            background: #fff; border-bottom: 1px solid var(--border);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); transform: translateY(-100%);
            transition: transform 0.3s ease; z-index: 90; max-height: 40vh; overflow-y: auto;
        }
        .file-dropdown.open { transform: translateY(0); }
        .file-list { list-style: none; margin: 0; padding: 0; }
        .file-list li {
            padding: 12px 20px; border-bottom: 1px solid #f0f0f0;
            cursor: pointer; display: flex; justify-content: space-between;
        }
        .file-list li:hover { background: var(--accent); }
        .file-title { font-weight: bold; font-size: 14px; }
        .file-date { font-size: 12px; color: #888; }

        /* View Containers */
        .view-container {
            flex-grow: 1; position: relative; display: none; height: 100%;
        }
        .view-container.active { display: flex; flex-direction: column; }

        /* --- TEXT VIEW --- */
        .editor-wrapper {
            position: relative; flex-grow: 1; display: flex; overflow: hidden;
            background: #fff;
        }
        
        .line-numbers {
            width: 40px; background: #f9f9f9; border-right: 1px solid var(--border);
            text-align: right; padding: 20px 5px 20px 0; font-family: var(--font-code);
            font-size: 14px; line-height: 1.6; color: #999; overflow: hidden;
            user-select: none; display: none;
        }

        .code-overlay, .editor-textarea {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            padding: 20px; box-sizing: border-box; font-size: 16px; line-height: 1.6;
            margin: 0; border: none; outline: none; overflow-y: auto;
        }
        
        .code-overlay {
            z-index: 1; pointer-events: none; font-family: var(--font-code);
            white-space: pre-wrap; word-wrap: break-word; color: transparent;
            display: none;
        }
        
        .editor-textarea {
            z-index: 2; background: transparent; color: var(--text);
            font-family: var(--font-main); resize: none;
        }

        .editor-wrapper.code-mode .line-numbers { display: block; }
        .editor-wrapper.code-mode .editor-textarea {
            left: 45px; width: calc(100% - 45px); font-family: var(--font-code);
            color: transparent; caret-color: #000;
        }
        .editor-wrapper.code-mode .code-overlay {
            display: block; left: 45px; width: calc(100% - 45px); color: #333;
        }

        .stats-bar {
            text-align: right; padding: 5px 20px; font-size: 11px; color: #999;
            background: #fff; border-top: 1px solid var(--border);
        }

        /* --- BOARD VIEW --- */
        .board-viewport {
            width: 100%; height: 100%; overflow: auto; position: relative;
            background: #f0f0f0; 
            /* Removed touch-action: none so native mobile scrolling works perfectly */
        }
        
        .board-canvas {
            width: 5000px; height: 5000px; position: absolute;
            background-image: radial-gradient(#ccc 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .board-tools {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; background: white; padding: 10px;
            border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 50;
        }

        /* Draggable Elements */
        .draggable {
            position: absolute; background: white; border: 1px solid var(--border);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-radius: 4px;
            display: flex; flex-direction: column; z-index: 10;
        }
        .drag-handle {
            height: 25px; background: rgba(0,0,0,0.05); cursor: move;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5px; touch-action: none; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .close-btn { background: none; border: none; font-size: 14px; cursor: pointer; color: #666; padding: 0 5px; }
        
        .note-body {
            border: none; outline: none; padding: 10px; resize: both;
            min-width: 150px; min-height: 150px; font-family: var(--font-main); font-size: 14px;
        }
        
        .board-table { border-collapse: collapse; margin: 10px; }
        .board-table td {
            border: 1px solid #ccc; padding: 5px; min-width: 60px; height: 30px;
            outline: none;
        }

        .drawing-canvas { cursor: crosshair; touch-action: none; background: #fff;}

        .color-dots { display: flex; gap: 6px; padding-left: 5px; }
        .dot { width: 14px; height: 14px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); }

    </style>
</head>
<body>

    <div class="top-bar">
        <div class="nav-tabs">
            <button class="nav-btn active" id="tabText">Text</button>
            <button class="nav-btn" id="tabBoard">Board</button>
        </div>
        <div class="file-controls" id="textControls">
            <button class="icon-btn" id="toggleCodeBtn">&lt;/&gt; Code</button>
            <button class="icon-btn" id="saveBtn">Save</button>
            <button class="icon-btn" id="filesBtn">Files ▾</button>
        </div>
    </div>

    <div class="file-dropdown" id="fileDropdown">
        <ul class="file-list" id="fileList"></ul>
        <div style="padding: 10px; text-align: center;">
            <button class="icon-btn" id="newFileBtn">+ Create New File</button>
        </div>
    </div>

    <div class="view-container active" id="textView">
        <div class="editor-wrapper" id="editorWrapper">
            <div class="line-numbers" id="lineNumbers">1</div>
            <pre class="code-overlay"><code id="codeHighlight" class="language-javascript"></code></pre>
            <textarea class="editor-textarea" id="mainEditor" spellcheck="false" placeholder="Start typing..."></textarea>
        </div>
        <div class="stats-bar" id="textStats">0 words | 0 chars</div>
    </div>

    <div class="view-container" id="boardView">
        <div class="board-viewport" id="boardViewport">
            <div class="board-canvas" id="boardCanvas">
                </div>
        </div>
        <div class="board-tools">
            <button class="icon-btn" id="addNoteBtn">📝 Note</button>
            <button class="icon-btn" id="addTableBtn">📊 Table</button>
            <button class="icon-btn" id="addDrawBtn">🖌️ Draw</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script>
        // --- GLOBAL & NAVIGATION ---
        const tabText = document.getElementById('tabText');
        const tabBoard = document.getElementById('tabBoard');
        const textView = document.getElementById('textView');
        const boardView = document.getElementById('boardView');
        const textControls = document.getElementById('textControls');

        tabText.addEventListener('click', () => {
            tabText.classList.add('active'); tabBoard.classList.remove('active');
            textView.classList.add('active'); boardView.classList.remove('active');
            textControls.style.display = 'flex';
        });

        tabBoard.addEventListener('click', () => {
            tabBoard.classList.add('active'); tabText.classList.remove('active');
            boardView.classList.add('active'); textView.classList.remove('active');
            textControls.style.display = 'none';
            // Slight delay ensures the DOM has updated the display property before math happens
            setTimeout(centerBoard, 10);
        });

        // --- TEXT FILES LOGIC ---
        const mainEditor = document.getElementById('mainEditor');
        const textStats = document.getElementById('textStats');
        const saveBtn = document.getElementById('saveBtn');
        const filesBtn = document.getElementById('filesBtn');
        const fileDropdown = document.getElementById('fileDropdown');
        const fileList = document.getElementById('fileList');
        const newFileBtn = document.getElementById('newFileBtn');
        const toggleCodeBtn = document.getElementById('toggleCodeBtn');
        const editorWrapper = document.getElementById('editorWrapper');
        const lineNumbers = document.getElementById('lineNumbers');
        const codeHighlight = document.getElementById('codeHighlight');

        let currentFileId = null;
        let isCodeMode = false;

        function updateStats() {
            const text = mainEditor.value;
            const chars = text.length;
            const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
            textStats.textContent = `${words} words | ${chars} chars`;
        }

        function updateLineNumbersAndCode() {
            const lines = mainEditor.value.split('\n');
            lineNumbers.innerHTML = lines.map((_, i) => i + 1).join('<br>');
            
            if (isCodeMode) {
                let text = mainEditor.value.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                if(text[text.length-1] === '\n') text += ' '; 
                codeHighlight.innerHTML = text;
                Prism.highlightElement(codeHighlight);
            }
        }

        mainEditor.addEventListener('scroll', () => {
            lineNumbers.scrollTop = mainEditor.scrollTop;
            document.querySelector('.code-overlay').scrollTop = mainEditor.scrollTop;
            document.querySelector('.code-overlay').scrollLeft = mainEditor.scrollLeft;
        });

        mainEditor.addEventListener('input', () => {
            updateStats();
            updateLineNumbersAndCode();
        });

        toggleCodeBtn.addEventListener('click', () => {
            isCodeMode = !isCodeMode;
            editorWrapper.classList.toggle('code-mode');
            toggleCodeBtn.style.background = isCodeMode ? '#e0e0e0' : 'none';
            updateLineNumbersAndCode();
        });

        function formatDate(ms) {
            const d = new Date(parseInt(ms));
            return `${d.toLocaleDateString()} ${d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
        }

        function loadFiles() {
            const files = JSON.parse(localStorage.getItem('appTextFiles')) || [];
            fileList.innerHTML = '';
            files.sort((a,b) => b.lastSaved - a.lastSaved).forEach(file => {
                const li = document.createElement('li');
                const title = file.content.split('\n')[0].trim() || 'Untitled';
                li.innerHTML = `<span class="file-title">${title}</span> <span class="file-date">${formatDate(file.lastSaved)}</span>`;
                li.onclick = () => { openFile(file.id); fileDropdown.classList.remove('open'); };
                fileList.appendChild(li);
            });
        }

        function saveFile() {
            const content = mainEditor.value;
            if (!content.trim() && !currentFileId) return;
            let files = JSON.parse(localStorage.getItem('appTextFiles')) || [];
            
            if (currentFileId) {
                const idx = files.findIndex(f => f.id === currentFileId);
                if (idx > -1) {
                    files[idx].content = content;
                    files[idx].lastSaved = Date.now();
                }
            } else {
                currentFileId = Date.now().toString();
                files.push({ id: currentFileId, content: content, lastSaved: Date.now() });
            }
            
            localStorage.setItem('appTextFiles', JSON.stringify(files));
            saveBtn.textContent = "Saved!";
            setTimeout(() => saveBtn.textContent = "Save", 1000);
            loadFiles();
        }

        function openFile(id) {
            const files = JSON.parse(localStorage.getItem('appTextFiles')) || [];
            const file = files.find(f => f.id === id);
            if (file) {
                currentFileId = file.id; mainEditor.value = file.content;
                updateStats(); updateLineNumbersAndCode();
            }
        }

        filesBtn.addEventListener('click', () => fileDropdown.classList.toggle('open'));
        newFileBtn.addEventListener('click', () => {
            currentFileId = null; mainEditor.value = '';
            updateStats(); updateLineNumbersAndCode(); fileDropdown.classList.remove('open');
        });

        saveBtn.addEventListener('click', saveFile);

        // --- BOARD LOGIC ---
        const boardViewport = document.getElementById('boardViewport');
        const boardCanvas = document.getElementById('boardCanvas');
        let zIndexCounter = 10;
        let boardCentered = false;

        function centerBoard() {
            if(!boardCentered && boardViewport.clientWidth > 0) {
                boardViewport.scrollLeft = 2500 - (boardViewport.clientWidth / 2);
                boardViewport.scrollTop = 2500 - (boardViewport.clientHeight / 2);
                boardCentered = true;
            }
        }

        window.onload = () => { loadFiles(); };

        // Desktop Panning ONLY (Mouse events). Mobile will use natural swipe scrolling.
        let isPanning = false, startPanX, startPanY, scrollLeft, scrollTop;
        boardViewport.addEventListener('mousedown', (e) => {
            if (e.target === boardViewport || e.target === boardCanvas) {
                isPanning = true;
                startPanX = e.pageX; startPanY = e.pageY;
                scrollLeft = boardViewport.scrollLeft; scrollTop = boardViewport.scrollTop;
                boardViewport.style.cursor = 'grabbing';
            }
        });
        window.addEventListener('mousemove', (e) => {
            if (!isPanning) return;
            boardViewport.scrollLeft = scrollLeft - (e.pageX - startPanX);
            boardViewport.scrollTop = scrollTop - (e.pageY - startPanY);
        });
        window.addEventListener('mouseup', () => {
            isPanning = false; boardViewport.style.cursor = 'default';
        });

        // Helper to get exactly center of the current screen view
        function getSpawnCoords() {
            return {
                x: boardViewport.scrollLeft + (boardViewport.clientWidth / 2) - 100,
                y: boardViewport.scrollTop + (boardViewport.clientHeight / 2) - 100
            };
        }

        function makeDraggable(element, handle) {
            let isDragging = false, startX, startY, initialLeft, initialTop;
            
            element.addEventListener('pointerdown', () => {
                zIndexCounter++; element.style.zIndex = zIndexCounter;
            });

            handle.addEventListener('pointerdown', (e) => {
                if(e.target.classList.contains('close-btn') || e.target.classList.contains('dot')) return;
                isDragging = true;
                startX = e.clientX; startY = e.clientY;
                initialLeft = element.offsetLeft; initialTop = element.offsetTop;
                handle.setPointerCapture(e.pointerId);
                e.stopPropagation(); 
            });

            handle.addEventListener('pointermove', (e) => {
                if (!isDragging) return;
                element.style.left = `${initialLeft + (e.clientX - startX)}px`;
                element.style.top = `${initialTop + (e.clientY - startY)}px`;
            });

            handle.addEventListener('pointerup', (e) => {
                isDragging = false; handle.releasePointerCapture(e.pointerId);
            });
        }

        // 1. Post-it Notes
        const colors = ['#fff9c4', '#ffcdd2', '#c8e6c9', '#bbdefb', '#e1bee7'];
        document.getElementById('addNoteBtn').addEventListener('click', () => {
            const pos = getSpawnCoords();
            const note = document.createElement('div');
            note.className = 'draggable';
            note.style.left = `${pos.x}px`;
            note.style.top = `${pos.y}px`;
            note.style.backgroundColor = colors[0];

            note.innerHTML = `
                <div class="drag-handle">
                    <div class="color-dots">
                        ${colors.map(c => `<div class="dot" style="background:${c}" data-color="${c}"></div>`).join('')}
                    </div>
                    <button class="close-btn">✕</button>
                </div>
                <textarea class="note-body" placeholder="Write here..." style="background:transparent;"></textarea>
            `;
            boardCanvas.appendChild(note);
            makeDraggable(note, note.querySelector('.drag-handle'));

            note.querySelector('.close-btn').addEventListener('click', () => note.remove());
            note.querySelectorAll('.dot').forEach(dot => {
                dot.addEventListener('click', (e) => {
                    note.style.backgroundColor = e.target.dataset.color;
                });
            });
        });

        // 2. Tables
        document.getElementById('addTableBtn').addEventListener('click', () => {
            const pos = getSpawnCoords();
            const container = document.createElement('div');
            container.className = 'draggable';
            container.style.left = `${pos.x}px`;
            container.style.top = `${pos.y}px`;
            container.innerHTML = `
                <div class="drag-handle"><span style="font-size:12px; margin-left:5px; font-weight:bold;">Table</span><button class="close-btn">✕</button></div>
                <table class="board-table">
                    <tr><td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td></tr>
                    <tr><td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td></tr>
                    <tr><td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td></tr>
                </table>
