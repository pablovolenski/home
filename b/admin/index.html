<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blog · admin</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div id="tokenPrompt" class="token-prompt">
        <input type="password" id="tokenInput" placeholder="You shall not pass!" autocomplete="off" spellcheck="false">
        <p id="tokenStatus"></p>
    </div>

    <div class="top-bar">
        <a class="wordmark" href="/b/">blog</a>
        <span class="top-bar-label">admin</span>
        <span id="syncIndicator" class="sync-indicator idle"></span>
    </div>

    <div class="content">

        <div class="view active" id="listView">
            <div class="list-header">
                <button class="btn" id="newPostBtn">+ New post</button>
            </div>
            <div id="postList"></div>
            <p id="emptyState" class="empty-state" style="display:none">No posts yet.</p>
        </div>

        <div class="view" id="editorView">
            <button class="back-btn" id="backFromEditor">← back</button>
            <div class="editor-form">
                <input type="text" id="editorTitle" placeholder="Title" class="editor-title">
                <div class="slug-row">
                    <span class="slug-prefix">pablovolenski.com/b/#</span><input type="text" id="editorSlug" placeholder="post-url-slug" class="slug-input" spellcheck="false">
                </div>
                <div class="toolbar">
                    <!-- Bold -->
                    <button class="tb-btn" data-action="bold" title="Bold"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M15.6 10.79c.97-.67 1.65-1.77 1.65-2.79 0-2.26-1.75-4-4-4H7v14h7.04c2.09 0 3.71-1.7 3.71-3.79 0-1.52-.86-2.82-2.15-3.42zM10 6.5h3c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5h-3v-3zm3.5 9H10v-3h3.5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5z"/></svg></button>
                    <!-- Italic -->
                    <button class="tb-btn" data-action="italic" title="Italic"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M10 4v3h2.21l-3.42 8H6v3h8v-3h-2.21l3.42-8H18V4z"/></svg></button>
                    <span class="tb-sep"></span>
                    <!-- H1 H2 H3 — text labels are clearest for heading levels -->
                    <button class="tb-btn tb-h" data-action="h1" title="Heading 1">H1</button>
                    <button class="tb-btn tb-h" data-action="h2" title="Heading 2">H2</button>
                    <button class="tb-btn tb-h" data-action="h3" title="Heading 3">H3</button>
                    <span class="tb-sep"></span>
                    <!-- Blockquote -->
                    <button class="tb-btn" data-action="quote" title="Blockquote"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M6 17h3l2-4V7H5v6h3zm8 0h3l2-4V7h-6v6h3z"/></svg></button>
                    <!-- Inline code -->
                    <button class="tb-btn" data-action="code" title="Inline code"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg></button>
                    <!-- Code block -->
                    <button class="tb-btn" data-action="codeblock" title="Code block"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11zM8 15h8v2H8zm0-4h8v2H8z"/></svg></button>
                    <span class="tb-sep"></span>
                    <!-- Link -->
                    <button class="tb-btn" data-action="link" title="Insert link"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg></button>
                    <!-- Image upload -->
                    <button class="tb-btn" data-action="image" title="Upload image"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg></button>
                    <input type="file" id="imageFileInput" accept="image/*" style="display:none">
                    <span class="tb-spacer"></span>
                    <label class="view-toggle" title="Toggle preview">
                        <span class="vt-label">code</span>
                        <input type="checkbox" id="previewCheckbox">
                        <span class="toggle-track"><span class="toggle-thumb"></span></span>
                        <span class="vt-label">view</span>
                    </label>
                </div>
                <textarea id="editorBody" placeholder="Write HTML…" class="editor-body"></textarea>
                <div id="editorPreview" class="editor-preview" contenteditable="true" style="display:none"></div>
                <div class="editor-actions">
                    <button class="btn" id="publishBtn">Publish</button>
                    <button class="btn secondary" id="cancelBtn">Cancel</button>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
