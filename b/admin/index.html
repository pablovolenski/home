<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blog · admin</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div id="tokenPrompt" class="token-prompt">
        <input type="password" id="tokenInput" placeholder="You shall not pass!" autocomplete="off" spellcheck="false">
        <p id="tokenStatus"></p>
    </div>

    <div class="top-bar">
        <a class="wordmark" href="/b/">blog</a>
        <span class="top-bar-label">admin</span>
        <span id="syncIndicator" class="sync-indicator idle"></span>
    </div>

    <div class="content">

        <div class="view active" id="listView">
            <div class="list-header">
                <button class="btn" id="newPostBtn">+ New post</button>
            </div>
            <div id="postList"></div>
            <p id="emptyState" class="empty-state" style="display:none">No posts yet.</p>
        </div>

        <div class="view" id="editorView">
            <button class="back-btn" id="backFromEditor">← back</button>
            <div class="editor-form">
                <input type="text" id="editorTitle" placeholder="Title" class="editor-title">
                <div class="toolbar">
                    <button class="tb-btn tb-bold"   data-action="bold"      title="Bold">B</button>
                    <button class="tb-btn tb-italic" data-action="italic"    title="Italic">I</button>
                    <span class="tb-sep"></span>
                    <button class="tb-btn" data-action="h1" title="Heading 1">H1</button>
                    <button class="tb-btn" data-action="h2" title="Heading 2">H2</button>
                    <button class="tb-btn" data-action="h3" title="Heading 3">H3</button>
                    <span class="tb-sep"></span>
                    <button class="tb-btn" data-action="quote"     title="Blockquote">"</button>
                    <button class="tb-btn tb-mono"   data-action="code"      title="Inline code">`</button>
                    <button class="tb-btn tb-mono"   data-action="codeblock" title="Code block">```</button>
                    <span class="tb-sep"></span>
                    <button class="tb-btn" data-action="link"  title="Insert link">&#x1F517;</button>
                    <button class="tb-btn" data-action="image" title="Upload image">&#x1F5BC;</button>
                    <input type="file" id="imageFileInput" accept="image/*" style="display:none">
                    <span class="tb-spacer"></span>
                    <label class="view-toggle" title="Toggle preview">
                        <span class="vt-label">code</span>
                        <input type="checkbox" id="previewCheckbox">
                        <span class="toggle-track"><span class="toggle-thumb"></span></span>
                        <span class="vt-label">view</span>
                    </label>
                </div>
                <textarea id="editorBody" placeholder="Write HTML…" class="editor-body"></textarea>
                <div id="editorPreview" class="editor-preview" contenteditable="true" style="display:none"></div>
                <div class="editor-actions">
                    <button class="btn" id="publishBtn">Publish</button>
                    <button class="btn secondary" id="cancelBtn">Cancel</button>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
