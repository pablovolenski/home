<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blog</title>
    <meta property="og:type"        content="article">
    <meta property="og:site_name"   content="blog">
    <meta property="og:title"       content="blog">
    <meta property="og:description" content="">
    <meta property="og:image"       content="">
    <meta property="og:url"         content="">
    <meta name="twitter:card"        content="summary">
    <meta name="twitter:title"       content="blog">
    <meta name="twitter:description" content="">
    <meta name="twitter:image"       content="">
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="top-bar">
        <a class="wordmark" href="/b/">blog</a>
    </div>

    <div class="content">

        <div class="view active" id="listView">
            <div id="postList"></div>
            <p id="emptyState" class="empty-state" style="display:none">No posts yet.</p>
        </div>

        <div class="view" id="postView">
            <button class="back-btn" id="backFromPost">← back</button>
            <article>
                <h1 id="postTitle"></h1>
                <div class="post-meta" id="postDate"></div>
                <img id="postFeaturedImg" class="post-featured-img" src="" alt="" style="display:none">
                <div class="post-body" id="postBody"></div>
            </article>
            <div class="share-bar" id="shareBar"></div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
