<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workspace</title>
        <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="top-bar">
        <div class="mode-switch" id="modeSwitch">
            <button class="mode-btn active" id="modePlainBtn" data-mode="plain">Plain</button>
            <button class="mode-btn" id="modeRichBtn" data-mode="rich">Rich</button>
            <button class="mode-btn" id="modeCodeBtn" data-mode="code">Code</button>
        </div>
        <div class="file-controls" id="fileControls">
            <button class="icon-btn" id="deleteCurrentBtn" title="Delete Current File">
                <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
            </button>
            <button class="icon-btn" id="filesBtn" title="Files Menu">
                <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
            </button>
            <span id="syncIndicator" class="sync-indicator" title="Gist sync not configured"></span>
            <button class="icon-btn" id="logoutBtn" title="Disconnect Gist sync">
                <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
            </button>
        </div>
    </div>

    <div id="tokenPrompt" class="token-prompt">
        <input type="password" id="tokenInput" placeholder="You shall not pass!" autocomplete="off" spellcheck="false">
        <button id="tokenSubmitBtn">→</button>
        <p id="tokenStatus"></p>
    </div>

    <div class="panel-overlay" id="panelOverlay"></div>
    <div class="file-panel" id="filePanel">
        <div class="panel-header">
            <input type="text" class="panel-search" id="panelSearch" placeholder="Search…" autocomplete="off" spellcheck="false">
            <button class="icon-btn panel-close-btn" id="panelClose" title="Close">
                <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
        </div>
        <div class="panel-body">
            <div id="fileList"></div>
        </div>
        <div class="panel-footer">
            <button class="icon-btn" id="newFileBtn" style="width: 100%; justify-content: center;">+ Create New</button>
        </div>
    </div>

    <div class="view-container active" id="textView">
        <div class="editor-wrapper active" id="editorWrapper">
            <div class="line-numbers" id="lineNumbers">1</div>
            <pre class="code-overlay"><code id="codeHighlight" class="language-javascript"></code></pre>
            <textarea class="editor-textarea" id="mainEditor" spellcheck="false" placeholder="Start typing..."></textarea>
        </div>

        <div class="rich-wrapper" id="richWrapper">
            <div class="rich-toolbar" id="richToolbar">
                <button class="tb-btn" data-action="bold" title="Bold"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M15.6 10.79c.97-.67 1.65-1.77 1.65-2.79 0-2.26-1.75-4-4-4H7v14h7.04c2.09 0 3.71-1.7 3.71-3.79 0-1.52-.86-2.82-2.15-3.42zM10 6.5h3c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5h-3v-3zm3.5 9H10v-3h3.5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5z"/></svg></button>
                <button class="tb-btn" data-action="italic" title="Italic"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M10 4v3h2.21l-3.42 8H6v3h8v-3h-2.21l3.42-8H18V4z"/></svg></button>
                <span class="tb-sep"></span>
                <button class="tb-btn tb-h" data-action="h1" title="Heading 1">H1</button>
                <button class="tb-btn tb-h" data-action="h2" title="Heading 2">H2</button>
                <button class="tb-btn tb-h" data-action="h3" title="Heading 3">H3</button>
                <span class="tb-sep"></span>
                <button class="tb-btn" data-action="quote" title="Blockquote"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M6 17h3l2-4V7H5v6h3zm8 0h3l2-4V7h-6v6h3z"/></svg></button>
                <button class="tb-btn" data-action="link" title="Insert link"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg></button>
                <span class="tb-sep"></span>
                <button class="tb-btn" data-action="image" title="Insert image"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg></button>
                <button class="tb-btn" data-action="table" title="Insert table"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M4 4v16h16V4H4zm7 14H6v-4h5v4zm0-6H6v-4h5v4zm7 6h-5v-4h5v4zm0-6h-5v-4h5v4z"/></svg></button>
                <span class="tb-sep"></span>
                <button class="tb-btn" data-action="addcol" title="Add column">+C</button>
                <button class="tb-btn" data-action="delcol" title="Remove column">-C</button>
                <button class="tb-btn" data-action="addrow" title="Add row">+R</button>
                <button class="tb-btn" data-action="delrow" title="Remove row">-R</button>
                <span class="tb-spacer"></span>
                <button class="tb-btn" data-action="plain" title="Paste as plain text (or Ctrl/Cmd+Shift+V)">Paste plain</button>
                <input type="file" id="richImageUpload" accept="image/*" style="display:none">
            </div>
            <div class="rich-editor" id="richEditor" contenteditable="true"></div>
        </div>

        <div class="stats-bar" id="textStats">0 words | 0 chars</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
