<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workspace</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="top-bar">
        <div class="nav-tabs">
            <button class="nav-btn active" id="tabText">Text</button>
            <button class="nav-btn" id="tabBoard">Board</button>
        </div>
        <div class="file-controls" id="fileControls">
            <button class="icon-btn" id="toggleCodeBtn" title="Toggle Code Mode">
                <svg viewBox="0 0 24 24"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>
            </button>
            <button class="icon-btn" id="saveBtn" title="Save File">
                <svg viewBox="0 0 24 24"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>
            </button>
            <button class="icon-btn" id="filesBtn">Files ▾</button>
        </div>
    </div>

    <div class="file-dropdown" id="fileDropdown">
        <ul class="file-list" id="fileList"></ul>
        <div style="padding: 10px; text-align: center;">
            <button class="icon-btn" id="newFileBtn">+ Create New File</button>
        </div>
    </div>

    <div class="view-container active" id="textView">
        <div class="editor-wrapper" id="editorWrapper">
            <div class="line-numbers" id="lineNumbers">1</div>
            <pre class="code-overlay"><code id="codeHighlight" class="language-javascript"></code></pre>
            <textarea class="editor-textarea" id="mainEditor" spellcheck="false" placeholder="Start typing..."></textarea>
        </div>
        <div class="stats-bar" id="textStats">0 words | 0 chars</div>
    </div>

    <div class="view-container" id="boardView">
        <div class="board-viewport" id="boardViewport">
            <div class="board-canvas" id="boardCanvas">
                </div>
        </div>
        <div class="board-tools">
            <button class="icon-btn" id="addNoteBtn">📝 Note</button>
            <button class="icon-btn" id="addTableBtn">📊 Table</button>
            <button class="icon-btn" id="addDrawBtn">🖌️ Draw</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
