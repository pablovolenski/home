<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workspace</title>
        <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="top-bar">
        <div class="nav-tabs">
            <button class="nav-btn active" id="tabText">Text</button>
            <button class="nav-btn" id="tabBoard">Board</button>
        </div>
        <div class="file-controls" id="fileControls">
            <button class="icon-btn" id="toggleCodeBtn" title="Toggle Code Mode">
                <svg viewBox="0 0 24 24"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>
            </button>
            <button class="icon-btn" id="deleteCurrentBtn" title="Delete Current File">
                <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
            </button>
            <button class="icon-btn" id="saveBtn" title="Save File">
                <svg viewBox="0 0 24 24"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>
            </button>
            <button class="icon-btn" id="filesBtn" title="Files Menu">
                <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
            </button>
            <span id="syncIndicator" class="sync-indicator" title="Gist sync not configured"></span>
            <button class="icon-btn" id="settingsBtn" title="Sync Settings">
                <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
            </button>
        </div>
    </div>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h3>Gist Sync</h3>
            <p>Store your notes in a private GitHub Gist — accessible from any device.</p>
            <label>GitHub Personal Access Token
                <small>(<a href="https://github.com/settings/tokens/new?scopes=gist&description=Workspace+Sync" target="_blank" rel="noopener">create one</a> with <code>gist</code> scope)</small>
            </label>
            <input type="password" id="patInput" placeholder="ghp_...">
            <label>Gist ID <small>(optional — auto-detected from your account)</small></label>
            <input type="text" id="gistIdInput" placeholder="e.g. a1b2c3d4e5f6...">
            <div class="modal-actions">
                <button id="settingsCancelBtn">Cancel</button>
                <button id="settingsSaveBtn" class="btn-primary">Connect</button>
            </div>
            <p id="settingsStatus"></p>
        </div>
    </div>

    <div class="file-dropdown" id="fileDropdown">
        <ul class="file-list" id="fileList"></ul>
        <div style="padding: 10px; text-align: center;">
            <button class="icon-btn" id="newFileBtn" style="width: 100%; justify-content: center;">+ Create New</button>
        </div>
    </div>

    <div class="view-container active" id="textView">
        <div class="editor-wrapper" id="editorWrapper">
            <div class="line-numbers" id="lineNumbers">1</div>
            <pre class="code-overlay"><code id="codeHighlight" class="language-javascript"></code></pre>
            <textarea class="editor-textarea" id="mainEditor" spellcheck="false" placeholder="Start typing..."></textarea>
        </div>
        <div class="stats-bar" id="textStats">0 words | 0 chars</div>
    </div>

    <div class="view-container" id="boardView">
        <div class="board-viewport" id="boardViewport">
            <div class="board-canvas" id="boardCanvas">
                </div>
        </div>
        <div class="board-tools">
            <button class="icon-btn" id="addNoteBtn">📝 Note</button>
            <button class="icon-btn" id="addTableBtn">📊 Table</button>
            <button class="icon-btn" id="addDrawBtn">🖌️ Draw</button>
            <button class="icon-btn" id="addImgBtn">🖼️ Image</button>
            <input type="file" id="imageUpload" accept="image/*" style="display: none;">
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
