<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosaico de Refranes - Pablo Volenski</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --border-thick: 5px;
            --highlight-bg: #ffffcc;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        #grid-container {
            display: grid;
            gap: 15px;
            width: 100%;
            /* Adaptativo: columnas de mínimo 320px */
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            grid-auto-rows: auto;
        }

        .card {
            background: white;
            border: var(--border-thick) solid black;
            /* Ajuste de márgenes internos reducidos */
            padding: 15px 20px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.5s ease-in-out;
            min-height: 140px; /* Altura mínima reducida */
        }

        .es {
            color: black;
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 6px; /* Menos margen */
            line-height: 1.1;
        }

        .pt {
            color: #008000;
            font-size: 1rem;
            margin-bottom: 3px; /* Menos margen */
            font-weight: 300;
        }

        .de {
            color: #ff0000;
            font-size: 1rem;
            font-weight: 300;
            line-height: 1.1;
        }

        /* Resaltado sin sombra negra */
        .active {
            background-color: var(--highlight-bg) !important;
            transform: scale(1.04);
            z-index: 10;
        }

        @media (min-width: 2000px) {
            #grid-container { grid-template-columns: repeat(6, 1fr); }
            .es { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <div id="grid-container"></div>

        const container = document.getElementById('grid-container');

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function renderGrid() {
            // Calculamos capacidad visual
            const cols = Math.floor(window.innerWidth / 350);
            const rows = Math.floor(window.innerHeight / 180);
            let displayLimit = Math.max(cols * rows, 4);
            
            const selected = shuffle([...allProverbs]).slice(0, displayLimit);
            
            container.innerHTML = '';
            selected.forEach((p, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.id = `card-${i}`;
                card.innerHTML = `
                    <div class="es">${p.es}</div>
                    <div class="pt">${p.pt}</div>
                    <div class="de">${p.de}</div>
                `;
                container.appendChild(card);
            });

            startAnimationCycle(displayLimit);
        }

        let animationTimeout;
        function startAnimationCycle(limit) {
            let currentIndex = 0;

            function next() {
                document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));

                if (currentIndex >= limit) {
                    renderGrid();
                    return;
                }

                const currentCard = document.getElementById(`card-${currentIndex}`);
                if (currentCard) {
                    currentCard.classList.add('active');
                    currentIndex++;
                    animationTimeout = setTimeout(next, 3000);
                }
            }
            next();
        }

        let resizeTimer;
        window.onresize = () => {
            clearTimeout(resizeTimer);
            clearTimeout(animationTimeout);
            resizeTimer = setTimeout(renderGrid, 500);
        };

        renderGrid();
    </script>
</body>
</html>
