<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mosaico de Refranes - Pablo Volenski</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root { --border-tk: 5px; --bg-high: #ffffcc; }
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw; 
            overflow: hidden; font-family: 'Montserrat', sans-serif; background: white; 
        }
        #grid { 
            display: grid; 
            width: 100%; height: 100%; 
            padding: 1.5vh; 
            gap: 1vh;
        }
        .card {
            border: var(--border-tk) solid black;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: background-color 0.4s ease, transform 0.4s ease;
            overflow: hidden;
            text-align: left;
        }
        .es { font-weight: 700; color: black; line-height: 1.1; margin-bottom: 0.4vh; }
        .pt { color: #008000; font-weight: 300; margin-bottom: 0.2vh; }
        .de { color: #ff0000; font-weight: 300; line-height: 1.1; }
        .active { background-color: var(--bg-high) !important; transform: scale(1.02); z-index: 10; }
    </style>
</head>
<body>
    <div id="grid"></div>
    <script>
        const proverbs = [
            {es: "A buen entendedor, pocas palabras bastan.", de: "Einem Klugen genügt ein Wort.", pt: "A bom entendedor, meia palavra basta."},
            {es: "A caballo regalado no se le mira el dentado.", de: "Einem geschenkten Gaul schaut man nicht ins Maul.", pt: "A cavalo dado não se olha o dente."},
            {es: "A Dios rogando y con el mazo dando.", de: "Hilf dir selbst, dann hilft dir Gott.", pt: "A Deus rogando e com o maço dando."},
            {es: "A falta de pan, buenas son tortas.", de: "In der Not frisst der Teufel Fliegen.", pt: "Na falta de pão, bolos são bons."},
            {es: "A grandes males, grandes remedios.", de: "Gegen große Übel helfen nur große Mittel.", pt: "Para grandes males, grandes remédios."},
            {es: "A la tercera va la vencida.", de: "Aller guten Dinge sind drei.", pt: "À terceira é de vez."},
            {es: "A palabras necias, oídos sordos.", de: "An dumme Sprüche verschwendet man kein Gehör.", pt: "Para palavras loucas, orelhas moucas."},
            {es: "A quien buen árbol se arrima, buena sombra le cobija.", de: "Wer sich an einen guten Baum lehnt, hat guten Schatten.", pt: "Quem a boa árvore se acolhe, boa sombra o cobre."},
            {es: "A río revuelto, ganancia de pescadores.", de: "Im Trüben ist gut fischen.", pt: "Em rio revolto, ganho de pescadores."},
            {es: "Agua pasada no mueve molino.", de: "Was geschehen ist, ist geschehen.", pt: "Águas passadas não movem moinho."},
            {es: "Agua que no has de beber, déjala correr.", de: "Kümmere dich um deine eigenen Angelegenheiten.", pt: "Água que não tens de beber, deixa-a correr."},
            {es: "Al que madruga, Dios lo ayuda.", de: "Morgenstund hat Gold im Mund.", pt: "Deus ajuda quem cedo madruga."},
            {es: "Aunque la mona se vista de seda, mona se queda.", de: "Ein Esel bleibt ein Esel.", pt: "Ainda que a mona se vista de seda, mona fica."},
            {es: "Cada loco con su tema.", de: "Jedem Tierchen sein Plaisierchen.", pt: "Cada louco com a sua mania."},
            {es: "Cada oveja con su pareja.", de: "Gleich und Gleich gesellt sich gern.", pt: "Cada ovelha com a sua parelha."},
            {es: "Caerse el mundo encima.", de: "Die Welt bricht zusammen.", pt: "Cair o mundo sobre a cabeça."},
            {es: "Camarón que se duerme se lo lleva la corriente.", de: "Wer rastet, der rostet.", pt: "Camarão que dorme a onda leva."},
            {es: "Contigo pan y cebolla.", de: "In guten wie in schlechten Zeiten.", pt: "Contigo pão e cebola."},
            {es: "Crea fama y échate a dormir.", de: "Ist der Ruf erst ruiniert.", pt: "Cria fama e deita-te a dormir."},
            {es: "Cría buena fama y échate a dormir.", de: "Ein guter Name ist viel wert.", pt: "Cria boa fama e deita-te a dormir."},
            {es: "Cría cuervos y te sacarán los ojos.", de: "Undank ist der Welt Lohn.", pt: "Cria corvos e eles tirar-te-ão os ojos."},
            {es: "Cruzar los dedos.", de: "Die Daumen drücken.", pt: "Cruzar os dedos."},
            {es: "Dando y dando, pajarito volando.", de: "Geben und Nehmen.", pt: "Dando e dando, passarinho voando."},
            {es: "Dar en el clavo.", de: "Den Nagel auf den Kopf treffen.", pt: "Dar no cravo."},
            {es: "Dar la cara.", de: "Den Kopf hinhalten.", pt: "Dar a cara."},
            {es: "De tal palo, tal astilla.", de: "Der Apfel fällt nicht weit vom Stamm.", pt: "Tal pai, tal filho."},
            {es: "Del dicho al hecho hay un buen trecho.", de: "Sagen und Tun sind zweierlei.", pt: "Do dito ao feito vai um grande eito."},
            {es: "Dime con quién andas y te diré quién eres.", de: "Sag mir, mit wem du umgehst.", pt: "Diz-me com quem andas e dir-te-ei quem és."},
            {es: "Dios aprieta pero no ahoga.", de: "Wenn die Not am größten, ist Gottes Hilfe am nächsten.", pt: "Deus aperta, mas não enforca."},
            {es: "Dios los cría y ellos se juntan.", de: "Gleich und Gleich gesellt sich gern.", pt: "Deus os cria e eles se juntam."},
            {es: "Donde hubo fuego, cenizas quedan.", de: "Alte Liebe rostet nicht.", pt: "Onde houve fogo, cinzas ficam."},
            {es: "Donde manda capitán, no manda marinero.", de: "Der Chef ist der Chef.", pt: "Onde manda o capitão, não manda o marinheiro."},
            {es: "Dormir a pierna suelta.", de: "Wie ein Murmeltier schlafen.", pt: "Dormir a sono solto."},
            {es: "Echar leña al fuego.", de: "Öl ins Feuer gießen.", pt: "Deitar lenha no fogo."},
            {es: "El hábito no hace al monje.", de: "Kleider machen Leute.", pt: "O hábito não faz o monge."},
            {es: "El que busca encuentra.", de: "Wer suchet, der findet.", pt: "Quem procura acha."},
            {es: "El que calla otorga.", de: "Wer schweigt, stimmt zu.", pt: "Quem cala consente."},
            {es: "El que la hace la paga.", de: "Wie man in den Wald hineinruft.", pt: "Aqui se faz, aqui se paga."},
            {es: "El que no corre, vuela.", de: "Wer zuerst kommt, mahlt zuerst.", pt: "Quem não corre, voa."},
            {es: "El que siembra cosecha.", de: "Man erntet, was man sät.", pt: "Quem semeia colhe."},
            {es: "El tiempo todo lo cura.", de: "Zeit heilt alle Wunden.", pt: "O tempo cura tudo."},
            {es: "Empezar la casa por el tejado.", de: "Das Pferd von hinten aufzäumen.", pt: "Começar a casa pelo telhado."},
            {es: "En boca cerrada no entran moscas.", de: "Reden ist Silber, Schweigen ist Gold.", pt: "Em boca fechada não entra mosca."},
            {es: "En casa del herrero, cuchillo de palo.", de: "Des Schuhmachers Frau hat die schlechtesten Schuhe.", pt: "Em casa de ferreiro, espeto de pau."},
            {es: "En el hablar está el arte.", de: "In der Rede liegt die Kunst.", pt: "Na fala está a arte."},
            {es: "Estar a dos velas.", de: "Pleite sein.", pt: "Estar sem um tostão."},
            {es: "Estar con la soga al cuello.", de: "Das Wasser steht bis zum Hals.", pt: "Estar com a corda no pescoço."},
            {es: "Estar en las nubes.", de: "Auf Wolke sieben schweben.", pt: "Estar nas nuvens."},
            {es: "Estar hasta la coronilla.", de: "Die Nase voll haben.", pt: "Estar farto."},
            {es: "Estar hecho un flan.", de: "Zittern wie Espenlaub.", pt: "Estar tremendo como vara verde."},
            {es: "Gato con guantes no caza ratones.", de: "Mit Samthandschuhen erreicht man nichts.", pt: "Gato de luvas não caça ratos."},
            {es: "Genio y figura hasta la sepultura.", de: "Was das Häschen nicht lernt, lernt der Hase nimmermehr.", pt: "Gênio e figura até à sepultura."},
            {es: "Hablando del rey de Roma, por la puerta asoma.", de: "Wenn man vom Teufel spricht.", pt: "Falando no diabo, ele aparece."},
            {es: "Hacer de tripas corazón.", de: "Gute Miene zum bösen Spiel machen.", pt: "Fazer das tripas coração."},
            {es: "Haz bien y no mires a quién.", de: "Tue Gutes und sprich nicht darüber.", pt: "Faz o bem sem olhar a quem."},
            {es: "Hierba mala nunca muere.", de: "Unkraut vergeht nicht.", pt: "Erva ruim nunca morre."},
            {es: "Hombre precavido vale por dos.", de: "Vorsicht ist die Mutter der Porzellankiste.", pt: "Hombre prevenido vale por dois."},
            {es: "La avaricia rompe el saco.", de: "Habgier zahlt sich nicht aus.", pt: "A ganância rompe o saco."},
            {es: "La curiosidad mató al gato.", de: "Neugier ist der Katzen Tod.", pt: "A curiosidade matou o gato."},
            {es: "La esperanza es lo último que se pierde.", de: "Die Hoffnung stirbt zuletzt.", pt: "A esperança é a última a morir."},
            {es: "La fe mueve montañas.", de: "Glaube versetzt Berge.", pt: "A fé move montanhas."},
            {es: "La práctica hace al maestro.", de: "Übung macht den Meister.", pt: "A práctica faz o mestre."},
            {es: "Ladran, Sancho, señal que cabalgamos.", de: "Die Hunde bellen.", pt: "Ladram, Sancho, sinal que cavalgamos."},
            {es: "Las palabras se las lleva el viento.", de: "Worte sind nur Schall und Rauch.", pt: "As palabras o vento as leva."},
            {es: "Las paredes oyen.", de: "Die Wände haben Ohren.", pt: "As paredes têm ouvidos."},
            {es: "Llevarse el gato al agua.", de: "Den Sieg davontragen.", pt: "Levar a mejor."},
            {es: "Llover a cántaros.", de: "Es regnet Bindfäden.", pt: "Chover a potes."},
            {es: "Lo barato sale caro.", de: "Wer billig kauft, kauft zweimal.", pt: "O barato sai caro."},
            {es: "Lo cortés no quita lo valiente.", de: "Höflichkeit kostet nichts.", pt: "A cortesia não tira a coragem."},
            {es: "Lo que no mata engorda.", de: "Was dich nicht umbringt, macht dich stärker.", pt: "O que no mata engorda."},
            {es: "Mal de muchos, consuelo de tontos.", de: "Geteiltes Leid ist halbes Leid.", pt: "Mal de muchos, consolo de tolos."},
            {es: "Más sabe el diablo por viejo que por diablo.", de: "Alter schützt vor Torheit nicht.", pt: "Más sabe o diabo por ser viejo que por diablo."},
            {es: "Más vale maña que fuerza.", de: "List geht über Gewalt.", pt: "Mais vale jeito do que força."},
            {es: "Más vale pájaro en mano que ciento volando.", de: "Ein Spatz in der Hand ist besser als die Taube.", pt: "Mais vale um pássaro na mão do que dois a voar."},
            {es: "Más vale prevenir que curar.", de: "Vorsicht ist besser als Nachsicht.", pt: "Mais vale prevenir do que remediar."},
            {es: "Más vale tarde que nunca.", de: "Besser spät als nie.", pt: "Mais vale tarde do que nunca."},
            {es: "Matar dos pájaros de un tiro.", de: "Zwei Fliegen mit einer Klappe schlagen.", pt: "Matar dois coelhos de uma cajadada só."},
            {es: "Meter la pata.", de: "Ins Fettnäpfchen treten.", pt: "Meter a pata."},
            {es: "Mucho ruido y pocas nueces.", de: "Viel Lärm um nichts.", pt: "Muito barulho por nada."},
            {es: "Mucha mano en el plato hace mucho garabato.", de: "Viele Köche verderben den Brei.", pt: "Muitas manos no prato fazem o gato."},
            {es: "Nadie es profeta en su tierra.", de: "Der Prophet gilt nichts im eigenen Land.", pt: "Ninguém é profeta na sua terra."},
            {es: "No dejes camino viejo por sendero nuevo.", de: "Alte Wege soll man nicht verlassen.", pt: "Não deixes o camino viejo pelo novo."},
            {es: "No dejes para mañana lo que puedas hacer hoy.", de: "Was du heute kannst besorgen...", pt: "Não deixes para amanhã o que podes hoy."},
            {es: "No hay mal que por bien no venga.", de: "In jedem Unglück steckt ein Glück.", pt: "No hay mal que por bien no venga."},
            {es: "No hay rosa sin espinas.", de: "Keine Rose ohne Dornen.", pt: "No hay rosa sin espinas."},
            {es: "No pegar ojo.", de: "Kein Auge zugetan.", pt: "Não pregar ojo."},
            {es: "No tener pelos en la lengua.", de: "Kein Blatt vor den Mund nehmen.", pt: "Não ter papas na língua."},
            {es: "No todo lo que brilla es oro.", de: "Es ist nicht alles Gold, was glänzt.", pt: "Nem tudo o que luz é ouro."},
            {es: "No ver tres en un burro.", de: "Blind wie ein Maulwurf sein.", pt: "Não ver um palmo à frente do nariz."},
            {es: "Obras son amores y no buenas razones.", de: "Taten sagen mehr als Worte.", pt: "Obras são amores e não boas razões."},
            {es: "Ojos que no ven, corazón que no siente.", de: "Aus den Augen, aus dem Sinn.", pt: "Olhos que não vêem, corazón que no siente."},
            {es: "Perder la cabeza.", de: "Den Kopf verlieren.", pt: "Perder a cabeza."},
            {es: "Perro ladrador, poco mordedor.", de: "Bange Hunde bellen viel.", pt: "Cão que ladra não morde."},
            {es: "Perro que ladra no muerde.", de: "Hunde, die bellen, beißen nicht.", pt: "Cão que ladra no morde."},
            {es: "Poco a poco se va lejos.", de: "Steter Tropfen höhlt den Stein.", pt: "Grão a grão a galinha enche o papo."},
            {es: "Poner los puntos sobre las íes.", de: "Die Punkte auf das i setzen.", pt: "Pôr os puntos nos is."},
            {es: "Quedarse de piedra.", de: "Wie versteinert sein.", pt: "Ficar de piedra."},
            {es: "Quien busca encuentra.", de: "Wer suchet, der findet.", pt: "Quem procura acha."},
            {es: "Quien mucho abarca poco aprieta.", de: "Wer zu viel unternimmt, dem gelingt wenig.", pt: "Quem muito abarca poco aperta."},
            {es: "Quien no arriesga, no gana.", de: "Wer nicht wagt, der nicht gewinnt.", pt: "Quem no arriesga, no gana."},
            {es: "Quien ríe el último ríe mejor.", de: "Wer zuletzt lacht, lacht am besten.", pt: "Quem ri por último ri mejor."},
            {es: "Quien siembra vientos cosecha tempestades.", de: "Wer Wind sät, wird Sturm ernten.", pt: "Quem semeia ventos colhe tempestades."},
            {es: "Quien tiene boca se equivoca.", de: "Irren ist menschlich.", pt: "Quem tem boca erra."},
            {es: "Saber es poder.", de: "Wissen ist Macht.", pt: "Saber é poder."},
            {es: "Sacar los trapos sucios.", de: "Schmutzige Wäsche waschen.", pt: "Lavar a roupa suja."},
            {es: "Sarna con gusto no pica.", de: "Was man gerne tut, fällt nicht schwer.", pt: "Quem corre por gosto não cansa."},
            {es: "Ser pan comido.", de: "Ein Kinderspiel sein.", pt: "Ser canja."},
            {es: "Ser un pez gordo.", de: "Ein hohes Tier sein.", pt: "Ser um figurão."},
            {es: "Sobre gustos no hay nada escrito.", de: "Über Geschmack lässt sich nicht streiten.", pt: "Gostos não se discutem."},
            {es: "Tener la cabeza en los pies.", de: "Den Kopf verlieren.", pt: "Estar com a cabeza noutro lugar."},
            {es: "Tener mala pata.", de: "Pech haben.", pt: "Ter azar."},
            {es: "Tirar la casa por la ventana.", de: "Geld zum Fenster rauswerfen.", pt: "Gastar o que não tem."},
            {es: "Tirar la toalla.", de: "Die Flinte ins Korn werfen.", pt: "Atirar a toalha."},
            {es: "Tirarse de los pelos.", de: "Sich die Haare raufen.", pt: "Arrancar os cabelos."},
            {es: "Todo lo que sube tiene que bajar.", de: "Hochmut kommt vor dem Fall.", pt: "Tudo o que sobe tem de descer."},
            {es: "Tomar el pelo.", de: "Jemanden auf den Arm nehmen.", pt: "Cozinhar o galo."},
            {es: "Un clavo saca otro clavo.", de: "Ein Dorn vertreibt den anderen.", pt: "Um cravo tira outro cravo."},
            {es: "Un lugar para cada cosa y cada cosa en su lugar.", de: "Ordnung ist das halbe Leben.", pt: "Um lugar para cada coisa e cada cosa no su lugar."},
            {es: "Vale más una imagen que mil palabras.", de: "Ein Bild sagt mehr als tausend Worte.", pt: "Uma imagen vale más que mil palabras."},
            {es: "Ver para creer.", de: "Erst sehen, dann glauben.", pt: "Ver para crer."},
            {es: "Zapatero a tus zapatos.", de: "Schuster, bleib bei deinen Leisten.", pt: "Sapateiro, não vás além do chinelo."}
        ];

        const grid = document.getElementById('grid');
        let timer;

        function getLayout() {
            const w = window.innerWidth;
            if (w < 1300) return { c: 3, r: 4 }; // Horizontal en laptops
            if (w < 1900) return { c: 4, r: 5 }; // Monitor grande
            return { c: 5, r: 6 };              // TV/4K
        }

        function render() {
            const layout = getLayout();
            const limit = layout.c * layout.r;
            
            grid.style.gridTemplateColumns = `repeat(${layout.c}, 1fr)`;
            grid.style.gridTemplateRows = `repeat(${layout.r}, 1fr)`;
            
            const cellH = (window.innerHeight / layout.r);
            const pad = cellH * 0.08;
            const fontES = cellH * 0.12;

            const selected = [...proverbs].sort(() => 0.5 - Math.random()).slice(0, limit);
            grid.innerHTML = '';
            
            selected.forEach((p, i) => {
                const c = document.createElement('div');
                c.className = 'card';
                c.id = `c-${i}`;
                c.style.padding = `${pad}px`;
                c.innerHTML = `
                    <div class="es" style="font-size:${fontES}px">${p.es}</div>
                    <div class="pt" style="font-size:${fontES*0.75}px">${p.pt}</div>
                    <div class="de" style="font-size:${fontES*0.7}px">${p.de}</div>
                `;
                grid.appendChild(c);
            });

            // Generar orden aleatorio de destaque
            const order = [...Array(limit).keys()].sort(() => 0.5 - Math.random());
            let step = 0;

            function cycle() {
                document.querySelectorAll('.card').forEach(x => x.classList.remove('active'));
                if(step >= limit) { 
                    render(); // Cambiar tablero tras completar el ciclo de destaque
                    return; 
                }
                const target = document.getElementById(`c-${order[step]}`);
                if(target) target.classList.add('active');
                step++;
                timer = setTimeout(cycle, 3000);
            }
            cycle();
        }

        window.onresize = () => { clearTimeout(timer); render(); };
        render();
    </script>
</body>
</html>
